name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # ========== QUALITY CHECKS ==========
  quality:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black format check
        run: black src/ tests/ --check

      - name: Mypy type check
        run: mypy src/

      - name: Pytest
        run: pytest tests/ -v --cov=src/ecommerce_analytics --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ========== SECURITY CHECKS ==========
  security:
    runs-on: ubuntu-latest
    name: Security Scan

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security check
        run: bandit -r src/ -ll || true

      - name: Safety check
        run: safety check --full-report || true

  # ========== BUILD & PUSH DOCKER IMAGES ==========
  build:
    needs: [quality, security]
    runs-on: ubuntu-latest
    name: Build Docker Images

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-api:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-api:${{ github.sha }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.dash
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-dash:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-dash:${{ github.sha }}

  # ========== DEPLOY TO GOOGLE CLOUD RUN ==========
  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Cloud Run

    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy API to Cloud Run
        id: deploy_api
        run: |
          API_URL=$(gcloud run deploy ecommerce-analytics-api \
            --image ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-api:${{ github.sha }} \
            --platform managed \
            --region southamerica-east1 \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "API_URL=$API_URL" >> $GITHUB_OUTPUT
          echo "Deployed API to: $API_URL"

      - name: Deploy Dashboard to Cloud Run
        run: |
          DASHBOARD_URL=$(gcloud run deploy ecommerce-analytics-dashboard \
            --image ${{ secrets.DOCKER_USERNAME }}/ecommerce-analytics-dash:${{ github.sha }} \
            --platform managed \
            --region southamerica-east1 \
            --allow-unauthenticated \
            --set-env-vars "API_BASE_URL=${{ steps.deploy_api.outputs.API_URL }}" \
            --format="value(status.url)")
          echo "Deployed Dashboard to: $DASHBOARD_URL"

      - name: Notify deployment
        run: |
          echo "✅ Deployment successful for E-Commerce Analytics Platform!"
          echo "API Service: ${{ steps.deploy_api.outputs.API_URL }}"
          echo "Dashboard Service: $DASHBOARD_URL"